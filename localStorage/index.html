<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daftar belanja</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container  mt-5">
            <h1><i class="mb-4"></i> Daftar Belanja</h1>
        </div>

        <!-- Input -->
        <div class="card mb-3">
            <div class="mb-3">
                <label for="namaBarang" class="form-label">Nama Barang</label>
                <input type="text" class="form-control" id="namaBarang" placeholder="Masukkan nama barang" required>
            </div>

            <div class="mb-3">
                <label for="jumlahBarang" class="form-label">Jumlah</label>
                 <input type="number" class="form-control" id="jumlahBarang" placeholder="Masukkan jumlah barang" min="1" required>
            </div>

            <div class="mb-3">
                <label for="keterangan" class="form-label">Keterangan</label>
                <textarea class="form-control" id="keterangan" rows="3" placeholder="Masukkan keterangan barang" required></textarea>
            </div>

            <div class="mb-3">
                <label for="imageUrl" class="form-label">Image URL</label>
                <input type="text" id="imageUrl" class="form-control border-primary mb-3" placeholder="Masukkan URL Gambar" />
            </div>

            <button class="btn btn-primary" onclick="SimpanBarang()">Simpan Barang</button>
        </div>

        <div class="data-container">
            <h2><i class="form-label"></i> Daftar Barang</h2>
            <div id="containerData" class="row g-4">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

    
</body>
</html>
